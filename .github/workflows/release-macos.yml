name: Release macOS

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag (for example, v0.1.0)
        required: true
        type: string
      prerelease:
        description: Mark as a prerelease
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  release:
    name: Production release
    runs-on: macos-14
    timeout-minutes: 90

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup show active-toolchain

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Build Blip Capture
        env:
          BLIP_BUILD_NUMBER: ${{ github.run_number }}
        run: apps/blip-capture/build-app.sh --dmg

      - name: Build Blip Studio
        env:
          BLIP_BUILD_NUMBER: ${{ github.run_number }}
        run: apps/blip-studio/build-app.sh --dmg

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag }}
          PRERELEASE: ${{ inputs.prerelease }}
        run: |
          args=(--target "$GITHUB_SHA" --generate-notes --title "$RELEASE_TAG")
          if [[ "$PRERELEASE" == "true" ]]; then
            args+=(--prerelease)
          fi
          gh release create "$RELEASE_TAG" \
            target/release/bundle/dmg/Blip-Capture.dmg \
            target/release/bundle/dmg/Blip-Studio.dmg \
            "${args[@]}"
