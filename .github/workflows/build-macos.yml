name: Build macOS

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: macOS DMGs
    runs-on: macos-14
    timeout-minutes: 90

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install Rust toolchain
        run: rustup show active-toolchain

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Build Blip Capture DMG
        env:
          BLIP_BUILD_NUMBER: ${{ github.run_number }}
        run: apps/blip-capture/build-app.sh --dmg

      - name: Build Blip Studio DMG
        env:
          BLIP_BUILD_NUMBER: ${{ github.run_number }}
        run: apps/blip-studio/build-app.sh --dmg

      - name: Upload Blip Capture
        uses: actions/upload-artifact@v7
        with:
          name: blip-capture-macos-${{ runner.arch }}
          path: target/release/bundle/dmg/Blip-Capture.dmg
          if-no-files-found: error
          retention-days: 14

      - name: Upload Blip Studio
        uses: actions/upload-artifact@v7
        with:
          name: blip-studio-macos-${{ runner.arch }}
          path: target/release/bundle/dmg/Blip-Studio.dmg
          if-no-files-found: error
          retention-days: 14
