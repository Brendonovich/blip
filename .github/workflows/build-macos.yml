name: Build macOS

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  debug:
    name: Debug binaries
    runs-on: macos-14
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install Rust toolchain
        run: rustup show active-toolchain

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Build debug binaries
        run: cargo build --locked --package blip-capture --package blip-studio

      - name: Package debug binaries
        run: |
          mkdir -p target/artifacts
          tar -czf target/artifacts/blip-capture.tar.gz -C target/debug blip-capture
          tar -czf target/artifacts/blip-studio.tar.gz -C target/debug blip-studio

      - name: Upload Blip Capture
        uses: actions/upload-artifact@v7
        with:
          name: blip-capture-macos-${{ runner.arch }}-debug
          path: target/artifacts/blip-capture.tar.gz
          if-no-files-found: error
          retention-days: 14

      - name: Upload Blip Studio
        uses: actions/upload-artifact@v7
        with:
          name: blip-studio-macos-${{ runner.arch }}-debug
          path: target/artifacts/blip-studio.tar.gz
          if-no-files-found: error
          retention-days: 14
